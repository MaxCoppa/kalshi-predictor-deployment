apiVersion: apps/v1
kind: Deployment
metadata:
  name: kalshi-predictor-deployment
  labels:
    app: kalshi-predictor
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kalshi-predictor
  template:
    metadata:
      labels:
        app: kalshi-predictor
    spec:
      containers:
      - name: kalshi-predictor
        image: maxcoppa/application:v0.0.5
        ports:
        - containerPort: 8000
        env:
        - name: JETON_API
          valueFrom:
            secretKeyRef:
              name: api-jeton
              key: JETON_API
            - name: MLFLOW_TRACKING_URI
              value: "https://user-avautrin-mlflow.user.lab.sspcloud.fr"
            - name: MLFLOW_TRACKING_USERNAME
              valueFrom:
                secretKeyRef:
                  name: mlflow-secrets
                  key: MLFLOW_TRACKING_USERNAME
            - name: MLFLOW_TRACKING_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mlflow-secrets
                  key: MLFLOW_TRACKING_PASSWORD
          resources:
            limits:
              memory: "2Gi"
              cpu: "1000m"
